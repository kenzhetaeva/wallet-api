services:
    postgres:
        image: postgres:17

        environment:
            POSTGRES_DB: wallet_api
            POSTGRES_USER: wallet
            POSTGRES_PASSWORD: wallet

        ports:
            - "5432:5432"

        volumes:
            - postgres-data:/var/lib/postgresql/data

    redis:
        image: redis:8
        ports:
            -   "6379:6379"


volumes:
    postgres-data:
