name: "Deploy to production"

on:
    push:
        branches:
            - master

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up SDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - name: Make Maven Wrapper executable
              run: chmod +x mvnw

            - name: Build project
              run: ./mvnw clean verify
