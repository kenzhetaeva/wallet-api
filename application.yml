spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/wallet_api
        username: wallet
        password: wallet

    data:
        redis:
            host: localhost
            port: 6379

    cache:
        type: redis
        redis:
            time-to-live: 24h

    jpa:
        hibernate:
            ddl-auto: validate

    flyway:
        enabled: true

server:
    servlet:
        context-path: /api/v1

logging:
    level:
        org.springframework.cache: TRACE
        org.springframework.data.redis: DEBUG
